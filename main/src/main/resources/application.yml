spring:
  application:
    name: main
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    # Supabase Shared Pooler의 Session mode 접속 정보(포트 5432)를 사용합니다.
    url: jdbc:postgresql://${SUPABASE_DB_POOLER_HOST}:${SUPABASE_DB_POOLER_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=${SUPABASE_DB_SSL_MODE:require}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}
  storage:
    url: ${SUPABASE_STORAGE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    bucket: ${SUPABASE_STORAGE_BUCKET:profile-images}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL:gpt-4o-mini}
