spring:
  datasource:
    url: jdbc:h2:mem:madmon;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

app:
  jwt:
    secret: test-only-secret-key-for-jwt-signing-not-used-in-production-0123456789
    access-token-expiration: 3600000
    refresh-token-expiration: 1209600000
  storage:
    url: http://localhost:54321/storage/v1
    service-role-key: test-only-service-role-key
    bucket: profile-images-test
  openai:
    base-url: http://localhost:54322/v1
    api-key: test-only-api-key
    model: gpt-4o-mini

logging:
  level:
    org.hibernate.SQL: warn
